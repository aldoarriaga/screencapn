name: Dependency audit

on:
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "package-lock.json"
      - ".github/workflows/audit.yml"
  schedule:
    # Weekly, Mondays 09:00 UTC, so new advisories are caught between releases.
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm audit --omit=dev --audit-level=high
